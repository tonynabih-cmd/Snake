<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tilt & Slither</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fff; touch-action: none; }
#app { width: 100vw; height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; }
.screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
.screen.hidden { display: none; }

#startScreen { background: #0a0a0f; z-index: 10; }
.logo-tag { font-size: 11px; letter-spacing: 0.25em; color: #4ecb8d; text-transform: uppercase; margin-bottom: 6px; }
h1 { font-size: 42px; font-weight: 800; letter-spacing: -1px; margin-bottom: 4px; }
h1 span { color: #4ecb8d; }
.tagline { font-size: 13px; color: #555; margin-bottom: 36px; letter-spacing: 0.04em; }
.snake-icon { display: flex; gap: 4px; margin-bottom: 36px; }
.snake-icon div { border-radius: 6px; }
.instructions { background: #111118; border: 0.5px solid #222230; border-radius: 16px; padding: 16px 20px; width: 100%; max-width: 300px; margin-bottom: 28px; }
.inst-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; font-size: 13px; color: #888; }
.inst-row:not(:last-child) { border-bottom: 0.5px solid #1c1c28; }
.inst-icon { width: 32px; height: 32px; background: #1a1a26; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.start-btn { background: #4ecb8d; color: #061a10; border: none; border-radius: 50px; padding: 16px 0; font-size: 17px; font-weight: 700; width: 100%; max-width: 260px; cursor: pointer; letter-spacing: 0.03em; transition: transform 0.1s; }
.start-btn:active { transform: scale(0.96); }
#sensorStatus { margin-top: 14px; font-size: 11px; color: #444; text-align: center; }
#sensorStatus.ok { color: #4ecb8d; }
#sensorStatus.warn { color: #e8a44a; }

#gameScreen { padding: 0; flex-direction: column; justify-content: flex-start; }
#hud { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 10px; flex-shrink: 0; }
.hud-block { text-align: center; }
.hud-label { font-size: 10px; color: #444; letter-spacing: 0.14em; text-transform: uppercase; }
.hud-val { font-size: 24px; font-weight: 700; line-height: 1.1; }
#scoreVal { color: #4ecb8d; }
#bestVal { color: #e8a44a; }
#pauseBtn { width: 38px; height: 38px; border-radius: 50%; background: #111118; border: 0.5px solid #222230; display: flex; align-items: center; justify-content: center; cursor: pointer; }
#pauseBtn svg { display: block; }
#canvas { display: block; width: 100%; flex: 1; }
#tiltHud { position: absolute; bottom: 18px; right: 18px; width: 54px; height: 54px; border-radius: 50%; background: #111118; border: 1px solid #222230; display: flex; align-items: center; justify-content: center; }
#tiltDot { width: 12px; height: 12px; border-radius: 50%; background: #4ecb8d; position: relative; will-change: transform; }

#pauseOverlay { background: rgba(10,10,15,0.9); z-index: 15; gap: 16px; }
.overlay-title { font-size: 30px; font-weight: 700; margin-bottom: 8px; }
.o-btn { border: none; border-radius: 50px; padding: 14px 0; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; max-width: 240px; transition: transform 0.1s; }
.o-btn:active { transform: scale(0.96); }
.o-btn.green { background: #4ecb8d; color: #061a10; }
.o-btn.dark { background: #111118; color: #aaa; border: 0.5px solid #222230; }

#gameOverScreen { background: rgba(10,10,15,0.95); z-index: 20; gap: 0; }
.go-title { font-size: 34px; font-weight: 800; margin-bottom: 4px; }
.go-sub { font-size: 13px; color: #555; margin-bottom: 24px; }
.score-card { background: #111118; border: 0.5px solid #222230; border-radius: 16px; padding: 24px; width: 100%; max-width: 260px; text-align: center; margin-bottom: 20px; }
.big-score { font-size: 64px; font-weight: 800; color: #4ecb8d; line-height: 1; }
.big-score-label { font-size: 11px; color: #555; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; margin-bottom: 16px; }
.divider { width: 100%; height: 0.5px; background: #1c1c28; margin-bottom: 14px; }
.best-row { display: flex; justify-content: space-between; align-items: center; }
.best-row-label { font-size: 12px; color: #555; }
.best-row-val { font-size: 20px; font-weight: 700; color: #e8a44a; }
.go-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 240px; align-items: center; }
</style>
</head>
<body>
<div id="app">

  <div id="startScreen" class="screen">
    <div class="logo-tag">Gyro Snake</div>
    <h1>Tilt &amp; <span>Slither</span></h1>
    <div class="tagline">Control the snake by tilting your device</div>
    <div class="snake-icon">
      <div style="width:18px;height:18px;background:#22925a;border-radius:5px"></div>
      <div style="width:18px;height:18px;background:#2ea56a;border-radius:5px"></div>
      <div style="width:18px;height:18px;background:#3ab87a;border-radius:5px"></div>
      <div style="width:20px;height:20px;background:#4ecb8d;border-radius:7px;margin-top:-1px"></div>
    </div>
    <div class="instructions">
      <div class="inst-row"><div class="inst-icon">↔</div>Tilt left / right to steer</div>
      <div class="inst-row"><div class="inst-icon">↕</div>Tilt forward / back to move up / down</div>
      <div class="inst-row"><div class="inst-icon">🍎</div>Eat food to grow and score</div>
      <div class="inst-row"><div class="inst-icon">💀</div>Avoid walls and your own tail</div>
    </div>
    <button class="start-btn" id="startBtn">Start Game</button>
    <div id="sensorStatus">Checking sensor availability…</div>
  </div>

  <div id="gameScreen" class="screen hidden">
    <div id="hud">
      <div class="hud-block"><div class="hud-label">Score</div><div class="hud-val" id="scoreVal">0</div></div>
      <div id="pauseBtn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1.5" y="1" width="4" height="12" rx="1.5" fill="#666"/>
          <rect x="8.5" y="1" width="4" height="12" rx="1.5" fill="#666"/>
        </svg>
      </div>
      <div class="hud-block"><div class="hud-label">Best</div><div class="hud-val" id="bestVal">0</div></div>
    </div>
    <canvas id="canvas"></canvas>
    <div id="tiltHud"><div id="tiltDot"></div></div>
  </div>

  <div id="pauseOverlay" class="screen hidden">
    <div class="overlay-title">Paused</div>
    <button class="o-btn green" id="resumeBtn">Resume</button>
    <button class="o-btn dark" id="pauseMenuBtn">Main Menu</button>
  </div>

  <div id="gameOverScreen" class="screen hidden">
    <div class="go-title">Game Over</div>
    <div class="go-sub" id="goReason">You hit a wall!</div>
    <div class="score-card">
      <div class="big-score" id="goScore">0</div>
      <div class="big-score-label">Score</div>
      <div class="divider"></div>
      <div class="best-row"><span class="best-row-label">Personal Best</span><span class="best-row-val" id="goBest">0</span></div>
    </div>
    <div class="go-btns">
      <button class="o-btn green" id="replayBtn">Play Again</button>
      <button class="o-btn dark" id="goMenuBtn">Main Menu</button>
    </div>
  </div>

</div>
<script>
(function () {
  const COLS = 20;
  const ROWS = 28;
  const STEP_MS = 125;
  const TILT_DEAD = 7;

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let CELL, OX, OY;
  let snake, dir, nextDir, food, score, best, running, paused, raf, lastStep;
  let calibGamma = null, calibBeta = null;
  let sensorReady = false;
  let deathMsg = '';
  let tiltDotX = 0, tiltDotY = 0;

  best = +localStorage.getItem('tiltsnake_best') || 0;

  function resize() {
    const w = window.innerWidth;
    const h = canvas.getBoundingClientRect().height || window.innerHeight - 56;
    canvas.width = w;
    canvas.height = h;
    CELL = Math.floor(Math.min(w / COLS, h / ROWS));
    OX = Math.floor((w - CELL * COLS) / 2);
    OY = Math.floor((h - CELL * ROWS) / 2);
  }

  window.addEventListener('resize', resize);

  function rr(cx, cy, cw, ch, r) {
    ctx.beginPath();
    ctx.moveTo(cx + r, cy);
    ctx.lineTo(cx + cw - r, cy);
    ctx.quadraticCurveTo(cx + cw, cy, cx + cw, cy + r);
    ctx.lineTo(cx + cw, cy + ch - r);
    ctx.quadraticCurveTo(cx + cw, cy + ch, cx + cw - r, cy + ch);
    ctx.lineTo(cx + r, cy + ch);
    ctx.quadraticCurveTo(cx, cy + ch, cx, cy + ch - r);
    ctx.lineTo(cx, cy + r);
    ctx.quadraticCurveTo(cx, cy, cx + r, cy);
    ctx.closePath();
  }

  function draw(ts) {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 0.5;
    for (let c = 0; c <= COLS; c++) {
      ctx.beginPath(); ctx.moveTo(OX + c * CELL, OY); ctx.lineTo(OX + c * CELL, OY + ROWS * CELL); ctx.stroke();
    }
    for (let r = 0; r <= ROWS; r++) {
      ctx.beginPath(); ctx.moveTo(OX, OY + r * CELL); ctx.lineTo(OX + COLS * CELL, OY + r * CELL); ctx.stroke();
    }

    ctx.strokeStyle = 'rgba(78,203,141,0.25)';
    ctx.lineWidth = 1;
    ctx.strokeRect(OX, OY, COLS * CELL, ROWS * CELL);

    const pulse = 0.82 + 0.18 * Math.sin(ts / 600);
    const fr = CELL * 0.4 * pulse;
    const fx = OX + food.x * CELL + CELL / 2;
    const fy = OY + food.y * CELL + CELL / 2;
    ctx.beginPath(); ctx.arc(fx, fy, fr, 0, Math.PI * 2);
    ctx.fillStyle = '#e85555'; ctx.fill();
    ctx.beginPath(); ctx.arc(fx - fr * 0.28, fy - fr * 0.3, fr * 0.28, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill();

    for (let i = snake.length - 1; i >= 0; i--) {
      const seg = snake[i];
      const px = OX + seg.x * CELL + 1;
      const py = OY + seg.y * CELL + 1;
      const ps = CELL - 2;
      const alpha = i === 0 ? 1 : Math.max(0.28, 1 - (i / snake.length) * 0.65);
      ctx.fillStyle = i === 0 ? `rgba(78,203,141,${alpha})` : `rgba(40,160,100,${alpha})`;
      rr(px, py, ps, ps, i === 0 ? Math.min(7, ps / 2) : Math.min(4, ps / 2));
      ctx.fill();

      if (i === 0) {
        const er = Math.max(1.5, CELL * 0.1);
        const eox = dir.x * ps * 0.15, eoy = dir.y * ps * 0.15;
        const perp = { x: -dir.y, y: dir.x };
        const e1x = px + ps * 0.5 + eox + perp.x * ps * 0.22;
        const e1y = py + ps * 0.5 + eoy + perp.y * ps * 0.22;
        const e2x = px + ps * 0.5 + eox - perp.x * ps * 0.22;
        const e2y = py + ps * 0.5 + eoy - perp.y * ps * 0.22;
        ctx.fillStyle = '#061a10';
        ctx.beginPath(); ctx.arc(e1x, e1y, er, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(e2x, e2y, er, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(e1x + er * 0.3, e1y - er * 0.3, er * 0.35, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(e2x + er * 0.3, e2y - er * 0.3, er * 0.35, 0, Math.PI * 2); ctx.fill();
      }
    }
  }

  function step() {
    dir = { x: nextDir.x, y: nextDir.y };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      return endGame('You hit a wall!');
    }
    for (let i = 0; i < snake.length; i++) {
      if (snake[i].x === head.x && snake[i].y === head.y) return endGame('You bit yourself!');
    }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score += 10;
      if (score > best) { best = score; localStorage.setItem('tiltsnake_best', best); }
      document.getElementById('scoreVal').textContent = score;
      spawnFood();
    } else {
      snake.pop();
    }
  }

  function tick(ts) {
    if (!running) return;
    raf = requestAnimationFrame(tick);
    if (!paused) {
      if (ts - lastStep > STEP_MS) { step(); lastStep = ts; }
      draw(ts);
    }
    const dot = document.getElementById('tiltDot');
    dot.style.transform = `translate(${tiltDotX * 16}px, ${tiltDotY * 16}px)`;
  }

  function spawnFood() {
    let pos;
    do { pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) }; }
    while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function initGame() {
    calibGamma = null; calibBeta = null;
    const mx = Math.floor(COLS / 2), my = Math.floor(ROWS / 2);
    snake = [{ x: mx, y: my }, { x: mx - 1, y: my }, { x: mx - 2, y: my }];
    dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 };
    score = 0; paused = false; running = true; lastStep = 0;
    spawnFood();
    document.getElementById('scoreVal').textContent = '0';
    document.getElementById('bestVal').textContent = best;
  }

  function startGame() {
    resize();
    initGame();
    show('gameScreen');
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(tick);
  }

  function endGame(msg) {
    running = false;
    cancelAnimationFrame(raf);
    document.getElementById('goScore').textContent = score;
    document.getElementById('goBest').textContent = best;
    document.getElementById('goReason').textContent = msg;
    show('gameOverScreen');
  }

  function show(id) {
    ['startScreen','gameScreen','pauseOverlay','gameOverScreen'].forEach(s => {
      document.getElementById(s).classList.toggle('hidden', s !== id);
    });
    if (id === 'gameScreen') document.getElementById('gameScreen').classList.remove('hidden');
  }

  function showGameAndPause(show2) {
    document.getElementById('gameScreen').classList.remove('hidden');
    document.getElementById('pauseOverlay').classList.toggle('hidden', !show2);
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
  }

  document.getElementById('pauseBtn').addEventListener('click', () => {
    if (!running) return;
    paused = !paused;
    showGameAndPause(paused);
  });
  document.getElementById('resumeBtn').addEventListener('click', () => {
    paused = false;
    showGameAndPause(false);
    if (!raf || !running) { running = true; raf = requestAnimationFrame(tick); }
  });
  document.getElementById('pauseMenuBtn').addEventListener('click', () => {
    running = false; paused = false; cancelAnimationFrame(raf); show('startScreen');
  });
  document.getElementById('replayBtn').addEventListener('click', startGame);
  document.getElementById('goMenuBtn').addEventListener('click', () => show('startScreen'));

  function onOrientation(e) {
    const gamma = e.gamma || 0;
    const beta = e.beta || 0;
    if (calibGamma === null) { calibGamma = gamma; calibBeta = beta; }
    const dg = gamma - calibGamma;
    const db = beta - calibBeta;
    tiltDotX = Math.max(-1, Math.min(1, dg / 25));
    tiltDotY = Math.max(-1, Math.min(1, db / 25));
    if (!running || paused) return;
    const adg = Math.abs(dg), adb = Math.abs(db);
    if (adg < TILT_DEAD && adb < TILT_DEAD) return;
    if (adg >= adb) {
      if (dg > TILT_DEAD && dir.x !== -1) nextDir = { x: 1, y: 0 };
      else if (dg < -TILT_DEAD && dir.x !== 1) nextDir = { x: -1, y: 0 };
    } else {
      if (db > TILT_DEAD && dir.y !== -1) nextDir = { x: 0, y: 1 };
      else if (db < -TILT_DEAD && dir.y !== 1) nextDir = { x: 0, y: -1 };
    }
  }

  function setupOrientation() {
    sensorReady = true;
    window.addEventListener('deviceorientation', onOrientation, true);
  }

  document.getElementById('startBtn').addEventListener('click', async () => {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const r = await DeviceOrientationEvent.requestPermission();
        if (r === 'granted') setupOrientation();
      } catch (e) { setupOrientation(); }
    } else if (typeof DeviceOrientationEvent !== 'undefined') {
      setupOrientation();
    }
    startGame();
  });

  document.addEventListener('keydown', e => {
    if (!running) return;
    const map = { ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 }, ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 } };
    const d = map[e.key];
    if (d && (d.x !== -dir.x || d.y !== -dir.y)) { nextDir = d; e.preventDefault(); }
    if (e.key === ' ') {
      if (!running) return;
      paused = !paused;
      showGameAndPause(paused);
    }
  });

  let tx0 = 0, ty0 = 0;
  document.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; ty0 = e.touches[0].clientY; }, { passive: true });
  document.addEventListener('touchend', e => {
    if (!running || paused || sensorReady) return;
    const dx = e.changedTouches[0].clientX - tx0;
    const dy = e.changedTouches[0].clientY - ty0;
    if (Math.hypot(dx, dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      if (dx > 0 && dir.x !== -1) nextDir = { x: 1, y: 0 };
      else if (dx < 0 && dir.x !== 1) nextDir = { x: -1, y: 0 };
    } else {
      if (dy > 0 && dir.y !== -1) nextDir = { x: 0, y: 1 };
      else if (dy < 0 && dir.y !== 1) nextDir = { x: 0, y: -1 };
    }
  }, { passive: true });

  (function checkSensor() {
    const el = document.getElementById('sensorStatus');
    if (typeof DeviceOrientationEvent !== 'undefined') {
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        el.textContent = 'Tap Start to enable gyroscope (iOS)';
        el.className = 'ok';
      } else {
        el.textContent = 'Gyroscope detected — ready';
        el.className = 'ok';
      }
    } else {
      el.textContent = 'No gyroscope — swipe to control';
      el.className = 'warn';
    }
  })();

  resize();
})();
</script>
</body>
</html>
